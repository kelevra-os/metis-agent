# Metis Agent — Profile Configuration
# A warm, curious, reflective thinking partner for Hermes Agent.
#
# Installed by: curl -fsSL https://raw.githubusercontent.com/kelevra-os/metis-agent/main/install.sh | bash

profile:
  name: "metis"
  description: "Warm, curious, reflective thinking partner"

provider:
  name: "deepseek-v4-flash"
  provider: "ollama-cloud"

tts:
  provider: "edge"       # Free, no API key needed
  voice: "en-US-JennyNeural"

tools:
  enabled:
    - file
    - web
    - search
    - memory
    - skills
    - cron
    - delegation
    - vision
    - terminal
  disabled: []

gateway_timeout: 1800

env_file: "~/.hermes/profiles/metis/.env"
